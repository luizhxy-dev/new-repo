<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natto — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Source Sans 3',sans-serif;}

/* ── BG ── */
body{
  background:#0d1f15;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;overflow:hidden;
}
.bg-orb{
  position:absolute;border-radius:50%;pointer-events:none;
}
.bg-orb-1{width:600px;height:600px;top:-120px;right:-150px;
  background:radial-gradient(circle,rgba(26,107,68,.35) 0%,transparent 70%);}
.bg-orb-2{width:500px;height:500px;bottom:-100px;left:-120px;
  background:radial-gradient(circle,rgba(200,16,46,.2) 0%,transparent 70%);}
.bg-orb-3{width:300px;height:300px;top:40%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(141,198,63,.1) 0%,transparent 70%);}

/* ── CARD ── */
.card{
  position:relative;z-index:10;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:48px 44px 44px;
  width:100%;max-width:420px;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}

/* ── LOGO ── */
.logo{
  display:flex;align-items:center;gap:12px;
  margin-bottom:36px;
}
.logo-icon{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#1a6b44 0%,#8dc63f 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;font-weight:900;font-size:18px;color:#fff;
  letter-spacing:-1px;flex-shrink:0;
}
.logo-text{
  display:flex;flex-direction:column;
}
.logo-name{
  font-family:'Inter',sans-serif;font-weight:800;font-size:20px;
  color:#fff;letter-spacing:-0.5px;
}
.logo-tagline{
  font-size:12px;color:rgba(255,255,255,.45);font-weight:400;
  letter-spacing:.02em;margin-top:1px;
}

/* ── HEADINGS ── */
.card-title{
  font-family:'Inter',sans-serif;font-weight:700;font-size:24px;
  color:#fff;margin-bottom:6px;letter-spacing:-0.5px;
}
.card-sub{
  font-size:14px;color:rgba(255,255,255,.45);margin-bottom:32px;
}

/* ── FIELDS ── */
.field{margin-bottom:18px;}
.field label{
  display:block;font-size:13px;font-weight:600;
  color:rgba(255,255,255,.6);margin-bottom:7px;letter-spacing:.02em;
}
.field input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;
  color:#fff;font-size:15px;
  font-family:'Source Sans 3',sans-serif;
  outline:none;transition:border .2s,background .2s;
}
.field input::placeholder{color:rgba(255,255,255,.25);}
.field input:focus{
  border-color:rgba(141,198,63,.6);
  background:rgba(255,255,255,.09);
}
.field input.error-input{border-color:rgba(200,16,46,.7);}

/* ── REMEMBER + FORGOT ── */
.row-extra{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:26px;
}
.remember{display:flex;align-items:center;gap:8px;cursor:pointer;}
.remember input[type=checkbox]{
  width:16px;height:16px;accent-color:#8dc63f;cursor:pointer;
}
.remember span{font-size:13px;color:rgba(255,255,255,.5);}
.forgot{font-size:13px;color:rgba(141,198,63,.8);text-decoration:none;transition:color .2s;}
.forgot:hover{color:#8dc63f;}

/* ── BTN ── */
.btn-login{
  width:100%;padding:15px;border:none;
  background:linear-gradient(135deg,#1a6b44 0%,#25a050 100%);
  color:#fff;font-size:16px;font-weight:700;
  font-family:'Inter',sans-serif;
  border-radius:12px;cursor:pointer;
  transition:opacity .2s,transform .15s,box-shadow .2s;
  letter-spacing:-.1px;
  box-shadow:0 4px 20px rgba(26,107,68,.4);
}
.btn-login:hover{opacity:.92;box-shadow:0 6px 28px rgba(26,107,68,.55);}
.btn-login:active{transform:scale(.98);}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}

/* ── ERROR MSG ── */
.error-msg{
  background:rgba(200,16,46,.15);
  border:1px solid rgba(200,16,46,.3);
  border-radius:8px;padding:11px 14px;
  font-size:13px;color:#f87171;
  margin-bottom:18px;display:none;
}

/* ── DIVIDER / DEMO INFO ── */
.demo-hint{
  text-align:center;margin-top:20px;
  font-size:12px;color:rgba(255,255,255,.25);
  line-height:1.7;
}
.demo-hint strong{color:rgba(255,255,255,.4);font-weight:600;}

/* ── LOADING SPINNER ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  display:inline-block;width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:8px;
}
</style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">N</div>
    <div class="logo-text">
      <span class="logo-name">Natto</span>
      <span class="logo-tagline">Plataforma de Gestão Ambiental</span>
    </div>
  </div>

  <h1 class="card-title">Bem-vindo de volta</h1>
  <p class="card-sub">Faça login para acessar os sistemas</p>

  <div class="error-msg" id="errorMsg">Usuário ou senha incorretos. Tente novamente.</div>

  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label for="email">Usuário</label>
      <input type="text" id="email" placeholder="Digite seu usuário" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <div class="row-extra">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span>Lembrar-me</span>
      </label>
      <a href="#" class="forgot">Esqueci a senha</a>
    </div>

    <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
  </form>

  <p class="demo-hint">
    Acesso: <strong>Thulio</strong> / <strong>meioambiente</strong>
  </p>
</div>

<script>
const form = document.getElementById('loginForm');
const btn  = document.getElementById('btnLogin');
const err  = document.getElementById('errorMsg');
const emailIn = document.getElementById('email');
const passIn  = document.getElementById('password');

// Se já autenticado, vai direto pro hub
if (sessionStorage.getItem('natto_auth')) {
  location.href = 'hub.html';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.style.display = 'none';
  emailIn.classList.remove('error-input');
  passIn.classList.remove('error-input');

  const email = emailIn.value.trim();
  const pass  = passIn.value;

  // Simula loading
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Verificando...';

  await new Promise(r => setTimeout(r, 900));

  // Validação
  const valid = email === 'Thulio' && pass === 'meioambiente';

  if (!valid) {
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
    err.style.display = 'block';
    emailIn.classList.add('error-input');
    passIn.classList.add('error-input');
    return;
  }

  // Salva sessão
  const userData = { email, name: email.split('@')[0], ts: Date.now() };
  sessionStorage.setItem('natto_auth', JSON.stringify(userData));
  if (document.getElementById('remember').checked) {
    localStorage.setItem('natto_remember', JSON.stringify(userData));
  }

  btn.innerHTML = '✓ Autenticado — redirecionando...';
  await new Promise(r => setTimeout(r, 500));
  location.href = 'hub.html';
});

// Auto-fill se lembrado
const remembered = localStorage.getItem('natto_remember');
if (remembered) {
  try {
    const u = JSON.parse(remembered);
    emailIn.value = u.email;
    document.getElementById('remember').checked = true;
  } catch {}
}
</script>
</body>
</html>
